[app]
name = "Template"
version = "1.0.0"
# run mode: vm|aws_lambda
runmode = "vm"
# environment value: local|dev|test|uat|prod
env.value = "dev"
# prefix of environment variables
env.prefix = "TM_"

[log]
# one of: ERROR, WARN, INFO, DEBUG
level = "INFO"

[jwt]
secret.code = "TOBE_REPLACED"

[cors]
allow.origins = ["https://template.com"]

[http]
# client config
client.timeout = 10
client.retry.max = 3
# server config
server.port = "8001"

[db]
# database sourece: postgres|mysql|sqlite
sqlite.path = "sqlite.db"
source = "postgres"
host = "localhost"
port = "5432"
name = "TOBE_REPLACED"
schema = "TOBE_REPLACED"
username = "TOBE_REPLACED"
password = "TOBE_REPLACED"
max.open.conns = 3
max.idle.conns = 1
conn.max.lifetime = 10
conn.max.idletime = 5
